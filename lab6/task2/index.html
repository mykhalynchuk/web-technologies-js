<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лабораторна робота 6 - Завдання 2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<main class="todo-container">
    <header class="todo-header">
        <h1>Мої завдання</h1>

        <form id="todo-form" class="todo-form">
            <input
                    type="text"
                    id="new-task-input"
                    placeholder="Що потрібно зробити?"
                    required
                    minlength="3"
                    autocomplete="off"
            >
            <button type="submit" class="btn btn-add">Додати</button>
        </form>
    </header>

    <section class="todo-controls">
        <label for="sort-select">Сортувати:</label>
        <select id="sort-select" class="sort-select">
            <option value="dateDesc">За датою (новіші спочатку)</option>
            <option value="dateAsc">За датою (старіші спочатку)</option>
            <option value="status">За станом (невиконані спочатку)</option>
            <option value="updatedDesc">За датою оновлення</option>
        </select>
    </section>

    <ul id="todo-list" class="todo-list">
    </ul>

    <div id="empty-state" class="empty-state hidden">
        <p>У вас немає завдань. Чудовий час, щоб відпочити!</p>
    </div>
</main>

<script src="script.js"></script>
</body>
</html>
