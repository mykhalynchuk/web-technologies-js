<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лабораторна робота 6 - Завдання 1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
    <h1>Каталог товарів</h1>
    <div class="total-cost">
        Загальна вартість: <span id="total-price">0</span> ₴
    </div>
</header>

<main class="container">
    <aside class="controls">
        <div class="control-group">
            <h3>Фільтрація за категорією</h3>
            <div class="btn-group" id="filter-buttons">
                <button class="btn active" data-filter="all">Всі</button>
                <button class="btn" data-filter="Електроніка">Електроніка</button>
                <button class="btn" data-filter="Одяг">Одяг</button>
                <button class="btn" data-filter="Їжа">Їжа</button>
                <button class="btn btn-reset" data-filter="all" id="reset-filter">Скинути фільтр</button>
            </div>
        </div>

        <div class="control-group">
            <h3>Сортування</h3>
            <div class="btn-group" id="sort-buttons">
                <button class="btn" data-sort="price">За ціною</button>
                <button class="btn" data-sort="dateCreated">За датою створення</button>
                <button class="btn" data-sort="dateUpdated">За датою оновлення</button>
                <button class="btn btn-reset" data-sort="default" id="reset-sort">Скинути сортування</button>
            </div>
        </div>
    </aside>

    <section class="content">
        <div id="product-list" class="product-grid">
        </div>
        <button id="btn-open-add-modal" class="btn btn-primary btn-add-main">Додати новий товар</button>
    </section>
</main>

<div id="product-modal" class="modal-overlay">
    <div class="modal-content">
        <h2 id="modal-title">Додати товар</h2>
        <form id="product-form">
            <input type="hidden" id="product-id">

            <div class="form-group">
                <label for="product-name">Назва товару:</label>
                <input type="text" id="product-name" required minlength="2" placeholder="Наприклад: Смартфон">
            </div>

            <div class="form-group">
                <label for="product-price">Ціна (₴):</label>
                <input type="number" id="product-price" required min="1" step="0.01" placeholder="1000">
            </div>

            <div class="form-group">
                <label for="product-category">Категорія:</label>
                <select id="product-category" required>
                    <option value="" disabled selected>Оберіть категорію</option>
                    <option value="Електроніка">Електроніка</option>
                    <option value="Одяг">Одяг</option>
                    <option value="Їжа">Їжа</option>
                </select>
            </div>

            <div class="form-group">
                <label for="product-image">URL зображення:</label>
                <input type="url" id="product-image" required placeholder="https://example.com/image.jpg">
            </div>

            <div class="modal-actions">
                <button type="button" class="btn" id="btn-cancel-modal">Скасувати</button>
                <button type="submit" class="btn btn-primary">Зберегти</button>
            </div>
        </form>
    </div>
</div>

<div id="snackbar" class="snackbar">Повідомлення</div>

<script src="script.js"></script>
</body>
</html>
