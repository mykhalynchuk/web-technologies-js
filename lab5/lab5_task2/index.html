<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Завдання 2: Світлофор</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Інтерактивний світлофор</h2>

<div class="traffic-light-box">
  <div id="light-red" class="light red"></div>
  <div id="light-yellow" class="light yellow"></div>
  <div id="light-green" class="light green"></div>
</div>

<p class="status-text">Поточний стан: <span id="status-display">Червоний</span></p>

<div class="controls">
  <button id="btn-next">Наступний стан (Вручну)</button>
  <button id="btn-settings">Змінити тривалість</button>
</div>

<script src="script.js"></script>
</body>
</html>
